<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto 10 Draws</title>
  <link href="/style.css" rel="stylesheet">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>로또 자동 추첨기</h1>
      <p>버튼 한 번으로 10세트를 생성합니다.</p>
    </header>

    <section class="controls">
      <button id="draw-button" type="button">10세트 추첨</button>
      <button id="copy-button" type="button" class="secondary">결과 복사</button>
    </section>

    <section class="result-panel">
      <h2>추첨 결과</h2>
      <div id="lotto-container" aria-live="polite"></div>
    </section>
  </main>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
